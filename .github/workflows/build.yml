name: build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Check if version already exists on npm
        if: startsWith(github.ref, 'refs/tags/v')
        id: npmcheck
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@nks-hub/zabbix-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already published, skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not published yet, continuing."
          fi

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') && steps.npmcheck.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
